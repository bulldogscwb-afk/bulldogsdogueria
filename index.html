      html += '<button class="toggle-pill ' + (done?'on':'off') + '" data-unit="' + uid + '"><i class="ti ' + (done?'ti-check':'ti-clock') + '" aria-hidden="true"></i> ' + (done?'Concluído hoje':'Pendente hoje') + '</button>';
      html += '</div></div>';
    });

    main.innerHTML = html;

    main.querySelectorAll('.toggle-pill').forEach(function(btn){
      btn.onclick = async function(){
        var uid = btn.getAttribute('data-unit');
        var st = await getData('checklist-status', {});
        var cur = st[uid] || {};
        var nowDone = !(cur.date===todayISO() && cur.done);
        st[uid] = {date: todayISO(), done: nowDone};
        var saved = await setData('checklist-status', st);
        if(saved){ logAudit(uid, 'Alterou checklist do dia', nowDone ? 'Marcado concluído' : 'Marcado pendente'); }
        renderChecklists(main);
      };
    });
  }

  // ============ AVALIAÇÕES (supervisor avalia; dono/gerente acompanham) ============
  var CRITERIOS_AVALIACAO = [
    {key:'pontualidade', label:'Pontualidade'},
    {key:'apresentacao', label:'Apresentação/Higiene'},
    {key:'atendimento', label:'Atendimento/Educação'},
    {key:'trabalhoEquipe', label:'Trabalho em equipe'},
    {key:'agilidade', label:'Agilidade'}
  ];

  function mediaAvaliacao(av){
    var soma = 0;
    CRITERIOS_AVALIACAO.forEach(function(c){ soma += (av.notas[c.key]||0); });
    return soma / CRITERIOS_AVALIACAO.length;
  }

  async function renderAvaliacoes(main){
    if(user.role==='supervisor'){
      await renderAvaliacoesForm(main);
    } else {
      await renderAvaliacoesReport(main);
    }
  }

  async function renderAvaliacoesForm(main){
    var loaded = await Promise.all([getData('colaboradores-avaliacao', []), getData('avaliacoes', [])]);
    var pessoas = loaded[0].filter(function(c){ return c.unit===user.unit && c.ativo!==false; });
    var avals = loaded[1];
    var avaliandoId = window.__avAvaliando || null;

    var html = pageHead('Avaliações', 'Avaliação rápida da equipe da sua unidade');

    if(avaliandoId){
      var pessoa = pessoas.find(function(p){ return p.id===avaliandoId; });
      if(!pessoa){ window.__avAvaliando = null; return renderAvaliacoesForm(main); }
      html += '<button class="btn" id="av-back" style="margin-bottom:14px;"><i class="ti ti-arrow-left" aria-hidden="true"></i> Voltar</button>';
      html += '<div class="card">';
      html += '<div style="font-weight:600; font-size:14px; margin-bottom:14px;">Avaliar ' + escapeHtml(pessoa.nome) + '</div>';
      CRITERIOS_AVALIACAO.forEach(function(c){
        html += '<div class="kv-row"><div class="kv-label">' + c.label + '</div>' +
          '<select class="grid-select" data-criterio="' + c.key + '" style="width:160px;">' +
            [1,2,3,4,5].map(function(n){ return '<option value="' + n + '"' + (n===3?' selected':'') + '>' + n + ' — ' + ['Ruim','Fraco','Ok','Bom','Ótimo'][n-1] + '</option>'; }).join('') +
          '</select></div>';
      });
      html += '<div class="form-field" style="margin-top:14px;"><label for="av-comentario">Comentário (opcional)</label><textarea id="av-comentario" rows="3" style="width:100%; padding:9px; border:1px solid var(--line); border-radius:7px; background:var(--paper);"></textarea></div>';
      html += '<div style="margin-top:14px;"><button class="btn primary" id="av-save">Salvar avaliação</button></div>';
      html += '</div>';

      main.innerHTML = html;
      document.getElementById('av-back').onclick = function(){ window.__avAvaliando = null; renderAvaliacoesForm(main); };
      document.getElementById('av-save').onclick = async function(){
        var notas = {};
        CRITERIOS_AVALIACAO.forEach(function(c){
          notas[c.key] = parseInt(main.querySelector('[data-criterio="' + c.key + '"]').value, 10);
        });
        var comentario = document.getElementById('av-comentario').value.trim();
        var novaAval = {id:'av'+Date.now(), unit:user.unit, avaliadoId:pessoa.id, avaliadoNome:pessoa.nome, avaliadorNome:user.nome, data:todayISO(), notas:notas, comentario:comentario};
        var all = await getData('avaliacoes', []);
        all.push(novaAval);
        var saved = await setData('avaliacoes', all);
        if(saved){ logAudit(user.unit, 'Avaliou colaborador', pessoa.nome + ' · média ' + mediaAvaliacao(novaAval).toFixed(1)); }
        window.__avAvaliando = null;
        showToast('Avaliação registrada.');
        renderAvaliacoesForm(main);
      };
      return;
    }

    html += '<div class="card">';
    if(pessoas.length===0){
      html += '<div class="empty">Nenhum colaborador cadastrado na sua unidade ainda — peça ao Dono/Gerente para cadastrar em Configurações → Cadastro de colaboradores.</div>';
    } else {
      html += '<table><thead><tr><th>Nome</th><th>Última avaliação</th><th></th></tr></thead><tbody>';
      pessoas.forEach(function(p){
        var minhas = avals.filter(function(a){ return a.avaliadoId===p.id; }).sort(function(a,b){ return b.data.localeCompare(a.data); });
        var ultima = minhas[0];
        html += '<tr><td>' + escapeHtml(p.nome) + '</td>' +
          '<td class="num-cell">' + (ultima ? ultima.data + ' (média ' + mediaAvaliacao(ultima).toFixed(1) + ')' : '—') + '</td>' +
          '<td><button class="btn primary" data-avaliar="' + p.id + '">Avaliar</button></td></tr>';
      });
      html += '</tbody></table>';
    }
    html += '</div>';

    main.innerHTML = html;
    main.querySelectorAll('[data-avaliar]').forEach(function(b){
      b.onclick = function(){ window.__avAvaliando = b.getAttribute('data-avaliar'); renderAvaliacoesForm(main); };
    });
  }

  async function renderAvaliacoesReport(main){
    var canPickUnit = user.role==='dono';
    var viewUnit = canPickUnit ? (window.__avUnit || 'unidade1') : user.unit;
    window.__avUnit = viewUnit;

    var avals = (await getData('avaliacoes', [])).filter(function(a){ return a.unit===viewUnit; });

    var html = pageHead('Avaliações', 'Acompanhamento da equipe, feito pelos supervisores');

    if(canPickUnit){
      html += '<div class="unit-toggle" style="margin-bottom:14px; width:fit-content;">';
      UNITS.forEach(function(u){
        html += '<button data-unit="' + u.id + '" class="' + (viewUnit===u.id?'active':'') + '">' + u.label + '</button>';
      });
      html += '</div>';
    }

    var porPessoa = {};
    avals.forEach(function(a){
      if(!porPessoa[a.avaliadoId]) porPessoa[a.avaliadoId] = {nome:a.avaliadoNome, avals:[]};
      porPessoa[a.avaliadoId].avals.push(a);
    });
    var nomes = Object.keys(porPessoa).sort(function(a,b){ return porPessoa[a].nome.localeCompare(porPessoa[b].nome); });

    html += '<div class="card">';
    html += '<div style="font-weight:600; font-size:14px; margin-bottom:8px;">Resumo por colaborador</div>';
    if(nomes.length===0){
      html += '<div class="empty">Nenhuma avaliação registrada ainda nesta unidade.</div>';
    } else {
      html += '<table><thead><tr><th>Nome</th><th>Avaliações</th><th>Média geral</th><th>Última</th></tr></thead><tbody>';
      nomes.forEach(function(username){
        var p = porPessoa[username];
        var medias = p.avals.map(mediaAvaliacao);
        var mediaGeral = medias.reduce(function(a,b){ return a+b; }, 0) / medias.length;
        var ultima = p.avals.slice().sort(function(a,b){ return b.data.localeCompare(a.data); })[0];
        html += '<tr><td>' + escapeHtml(p.nome) + '</td><td class="num-cell">' + p.avals.length + '</td>' +
          '<td class="num-cell" style="font-weight:600;">' + mediaGeral.toFixed(1) + '</td>' +
          '<td class="num-cell">' + ultima.data + '</td></tr>';
      });
      html += '</tbody></table>';
    }
    html += '</div>';

    html += '<div style="height:16px"></div><div class="card">';
    html += '<div style="font-weight:600; font-size:14px; margin-bottom:8px;">Histórico completo</div>';
    if(avals.length===0){
      html += '<div class="empty">Nada por aqui ainda.</div>';
    } else {
      html += '<table><thead><tr><th>Data</th><th>Colaborador</th><th>Avaliador</th><th>Média</th><th>Comentário</th></tr></thead><tbody>';
      avals.slice().sort(function(a,b){ return b.data.localeCompare(a.data); }).forEach(function(a){
        html += '<tr><td class="num-cell">' + a.data + '</td><td>' + escapeHtml(a.avaliadoNome) + '</td><td>' + escapeHtml(a.avaliadorNome) + '</td>' +
          '<td class="num-cell">' + mediaAvaliacao(a).toFixed(1) + '</td><td style="color:var(--muted);">' + escapeHtml(a.comentario||'—') + '</td></tr>';
      });
      html += '</tbody></table>';
    }
    html += '</div>';

    main.innerHTML = html;

    if(canPickUnit){
      main.querySelectorAll('.unit-toggle button').forEach(function(b){
        b.onclick = function(){ window.__avUnit = b.getAttribute('data-unit'); renderAvaliacoesReport(main); };
      });
    }
  }

  // ============ AUDITORIA (dono/gerente) ============
  async function renderAuditoria(main){
    var canPickUnit = user.role==='dono';
    var viewUnit = canPickUnit ? (window.__auUnit || 'todas') : user.unit;
    window.__auUnit = viewUnit;

      if(!canPickUnit && labelUnit(user.unit)!==e.unit) return false;

      if(search){
        var hay = (e.action + ' ' + e.details + ' ' + e.role + ' ' + e.unit).toLowerCase();
        if(hay.indexOf(search.toLowerCase())===-1) return false;
      }
      return true;
    });

    var html = pageHead('Auditoria', 'Histórico de quem alterou o quê — proteção contra desvios, não editável por ninguém');

    if(canPickUnit){
      html += '<div class="unit-toggle" style="margin-bottom:14px; width:fit-content;">';

        html += '<button data-unit="' + u.id + '" class="' + (viewUnit===u.id?'active':'') + '">' + u.label + '</button>';

      html += '<table><thead><tr><th>Quando</th><th>Quem</th><th>Unidade</th><th>Ação</th><th>Detalhes</th></tr></thead><tbody>';

          '<td style="color:var(--muted);">' + escapeHtml(e.details) + '</td></tr>';
      });

      if(filtered.length>200){
        html += '<div style="font-size:11.5px; color:var(--muted); margin-top:10px;">Mostrando os 200 registros mais recentes de ' + filtered.length + '.</div>';
      }
    }
    html += '</div>';

    main.innerHTML = html;

    if(canPickUnit){
      main.querySelectorAll('.unit-toggle button').forEach(function(b){
        b.onclick = function(){ window.__auUnit = b.getAttribute('data-unit'); renderAuditoria(main); };

    }
    html += '<div class="add-row-bar">';
    html += '<input class="grid-input wide" type="text" id="moto-cad-nome" placeholder="Nome do motoboy">';
    html += '<input class="grid-input wide" type="text" id="moto-cad-pix" placeholder="Chave pix">';
    html += '<button class="btn primary" id="moto-cad-add">Cadastrar motoboy</button>';
    html += '</div>';
    html += '</div>';

    html += '<div style="height:16px"></div>';
    html += '<div class="card">';
    html += '<div style="font-weight:600; font-size:14px;">Cadastro de colaboradores (Equipe/Caixa)</div>';
    html += '<div style="font-size:11.5px; color:var(--muted); margin-top:2px;">Nomes que aparecem pro Supervisor avaliar. Não precisa de login — é só o nome, por unidade.</div>';
    if(colabAvaliacao.length===0){
      html += '<div class="empty">Nenhum colaborador cadastrado ainda.</div>';
    } else {
      html += '<table style="margin-top:10px;"><thead><tr><th>Nome</th><th>Unidade</th><th></th></tr></thead><tbody>';
      colabAvaliacao.forEach(function(c){
        html += '<tr><td>' + escapeHtml(c.nome) + '</td><td>' + labelUnit(c.unit) + '</td>' +
          '<td><button class="btn" data-remove-colab-cad="' + c.id + '">Remover</button></td></tr>';
      });
      html += '</tbody></table>';
    }
    html += '<div class="add-row-bar">';
    html += '<input class="grid-input wide" type="text" id="colab-cad-nome" placeholder="Nome do colaborador">';
    html += '<select class="grid-select" id="colab-cad-unit">' + UNITS.map(function(u2){ return '<option value="' + u2.id + '">' + u2.label + '</option>'; }).join('') + '</select>';
    html += '<button class="btn primary" id="colab-cad-add">Cadastrar colaborador</button>';
    html += '</div>';
    html += '</div>';

    var CONFIGURABLE_ROLES = ['gerente','supervisor','equipe','caixa'];
    html += '<div style="height:16px"></div><div class="card">';
    html += '<div style="font-weight:600; font-size:14px;">Acesso por nível</div>';
    html += '<div style="font-size:11.5px; color:var(--muted); margin-top:2px;">Escolha quais telas cada nível pode acessar. Dono sempre tem acesso a tudo, e essa tela de Configurações continua exclusiva do Dono.</div>';
    html += '<table style="margin-top:12px;"><thead><tr><th>Tela</th>' + CONFIGURABLE_ROLES.map(function(r){ return '<th>' + labelRole(r) + '</th>'; }).join('') + '</tr></thead><tbody>';
    NAV.filter(function(n){ return n.id!=='config'; }).forEach(function(n){
      var eff = effectiveRoles(n);
      html += '<tr><td>' + n.label + '</td>' + CONFIGURABLE_ROLES.map(function(r){
        var checked = eff.indexOf(r)!==-1;
        return '<td style="text-align:center;"><input type="checkbox" data-nav-perm="' + n.id + '" data-role="' + r + '"' + (checked?' checked':'') + '></td>';
      }).join('') + '</tr>';
    });
    html += '</tbody></table>';
    html += '<div style="margin-top:14px;"><button class="btn primary" id="nav-perm-save">Salvar acessos</button></div>';
    html += '</div>';

    html += '<div style="height:16px"></div><div class="card">';
    html += '<div style="font-weight:600; font-size:14px;">Backup</div>';
    html += '<div style="font-size:11.5px; color:var(--muted); margin-top:2px;">Baixa uma cópia completa de todos os dados do sistema (motoboys, caixa, colaboradores, escala, usuários, auditoria). Guarde periodicamente como segurança extra.</div>';
    html += '<div style="margin-top:14px; display:flex; gap:10px; flex-wrap:wrap; align-items:center;">';
    html += '<button class="btn primary" id="backup-export">Exportar backup completo</button>';
    html += '<button class="btn" id="backup-import-btn">Importar backup</button>';
    html += '<input type="file" id="backup-file" accept="application/json" style="display:none;">';
    html += '</div>';
    html += '<div style="font-size:11px; color:var(--muted); margin-top:10px;">Importar substitui os dados atuais pelos do arquivo — use com cuidado, de preferência exporte um backup atual antes.</div>';
    html += '</div>';

    main.innerHTML = html;

    main.querySelectorAll('[data-remove-moto-cad]').forEach(function(btn){
      btn.onclick = async function(){
        if(!(await showConfirm('Remover este motoboy do cadastro? Ele some das opções da escala, mas os lançamentos já feitos continuam no histórico.', 'Remover'))) return;
        var id = btn.getAttribute('data-remove-moto-cad');
        var all = await getData('motoboy-cadastro', []);
        var idx = all.findIndex(function(m){ return m.id===id; });
        if(idx>-1){
          var nome = all[idx].nome;
          all[idx].ativo = false;
          var saved = await setData('motoboy-cadastro', all);
          if(saved){ logAudit('Ambas as unidades', 'Removeu motoboy do cadastro', nome); }
        }
        renderConfig(main);
      };
    });

    document.getElementById('moto-cad-add').onclick = async function(){
      var nome = document.getElementById('moto-cad-nome').value.trim();
      var pix = document.getElementById('moto-cad-pix').value.trim();
      if(!nome){ showToast('Informe o nome do motoboy.', 'error'); return; }
      var all = await getData('motoboy-cadastro', []);
      all.push({id:'m'+Date.now(), nome:nome, pix:pix, ativo:true});
      var saved = await setData('motoboy-cadastro', all);
      if(saved){ logAudit('Ambas as unidades', 'Cadastrou motoboy', nome + (pix ? ' · pix ' + pix : '')); }
      renderConfig(main);
    };

    main.querySelectorAll('[data-remove-colab-cad]').forEach(function(btn){
      btn.onclick = async function(){
        if(!(await showConfirm('Remover este colaborador do cadastro?', 'Remover'))) return;
        var id = btn.getAttribute('data-remove-colab-cad');
        var all = await getData('colaboradores-avaliacao', []);
        var idx = all.findIndex(function(c){ return c.id===id; });
        if(idx>-1){
          var nome = all[idx].nome, unit = all[idx].unit;
          all[idx].ativo = false;
          var saved = await setData('colaboradores-avaliacao', all);
          if(saved){ logAudit(unit, 'Removeu colaborador do cadastro', nome); }
        }
        renderConfig(main);
      };
    });

    document.getElementById('colab-cad-add').onclick = async function(){
      var nome = document.getElementById('colab-cad-nome').value.trim();
      var unit = document.getElementById('colab-cad-unit').value;
      if(!nome){ showToast('Informe o nome do colaborador.', 'error'); return; }
      var all = await getData('colaboradores-avaliacao', []);
      all.push({id:'co'+Date.now(), nome:nome, unit:unit, ativo:true});
      var saved = await setData('colaboradores-avaliacao', all);
      if(saved){ logAudit(unit, 'Cadastrou colaborador', nome); }
      renderConfig(main);
    };

    document.getElementById('nav-perm-save').onclick = async function(){
      var newPerms = {};
      NAV.filter(function(n){ return n.id!=='config'; }).forEach(function(n){
        var roles = [];
        CONFIGURABLE_ROLES.forEach(function(r){
          var cb = main.querySelector('[data-nav-perm="' + n.id + '"][data-role="' + r + '"]');
          if(cb && cb.checked) roles.push(r);
        });
        newPerms[n.id] = roles;
      });
      var saved = await setData('nav-permissions', newPerms);
      if(saved){
        navPermissions = newPerms;
        logAudit('Ambas as unidades', 'Atualizou acesso por nível', '');
        showToast('Acessos atualizados.');
        renderApp();
      }
    };

    var BACKUP_KEYS = ['motoboys-entries','rates-unidade1','rates-unidade2','motoboy-schedule','motoboy-cadastro',
      'motoboys-turno-status','caixa-fechamento','caixa-fechamento-status','conteudo','nav-permissions','avaliacoes',
      'colaboradores-avaliacao','insumos-cadastro','checklist-status','audit-log','users-list'];

    document.getElementById('backup-export').onclick = async function(){
      var values = await Promise.all(BACKUP_KEYS.map(function(k){ return getData(k, null); }));
      var data = {};
      BACKUP_KEYS.forEach(function(k, i){ data[k] = values[i]; });
      var payload = {exportedAt: new Date().toISOString(), exportedBy: user.nome || labelRole(user.role), data: data};
      var blob = new Blob([JSON.stringify(payload, null, 2)], {type:'application/json'});
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = 'backup-central-gestao-' + todayISO() + '.json';
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
      logAudit('Ambas as unidades', 'Exportou backup completo', '');
      showToast('Backup exportado — confira a pasta de downloads.');
    };

    document.getElementById('backup-import-btn').onclick = function(){
      document.getElementById('backup-file').click();
    };

    document.getElementById('backup-file').addEventListener('change', function(ev){
      var file = ev.target.files[0];
      if(!file) return;
      var reader = new FileReader();
      reader.onload = async function(){
        var parsed;
        try{ parsed = JSON.parse(reader.result); }
        catch(err){ showToast('Não consegui ler esse arquivo. Verifique se é um backup exportado daqui.', 'error'); return; }
        var data = parsed.data || parsed;
        var keysFound = Object.keys(data).filter(function(k){ return BACKUP_KEYS.indexOf(k)!==-1; });
        if(keysFound.length===0){ showToast('Arquivo inválido: nenhum dado reconhecido.', 'error'); return; }
        if(!(await showConfirm('Importar este backup vai substituir os dados atuais de ' + keysFound.length + ' área(s) do sistema. Continuar?', 'Importar'))) return;
        for(var i=0;i<keysFound.length;i++){
          await setData(keysFound[i], data[keysFound[i]]);
        }
        logAudit('Ambas as unidades', 'Importou backup', keysFound.length + ' área(s) restauradas');
        showToast('Backup importado com sucesso.');
        renderConfig(main);
      };
      reader.readAsText(file);
    });

    main.querySelectorAll('button[data-unit]').forEach(function(btn){
      btn.onclick = async function(){
        var uid = btn.getAttribute('data-unit');
        var newRates = {
          dog: parseFloat(document.getElementById('rate-dog-'+uid).value)||0,
          dell: parseFloat(document.getElementById('rate-dell-'+uid).value)||0,
          rtDog: parseFloat(document.getElementById('rate-rtdog-'+uid).value)||0,
          rtDell: parseFloat(document.getElementById('rate-rtdell-'+uid).value)||0,
          diariaAlmoco: parseFloat(document.getElementById('rate-diaria-almoco-'+uid).value)||0,
          diariaTarde: parseFloat(document.getElementById('rate-diaria-tarde-'+uid).value)||0,
          diariaNoite: parseFloat(document.getElementById('rate-diaria-noite-'+uid).value)||0
        };
        var saved = await setData('rates-' + uid, newRates);
        if(saved){ logAudit(uid, 'Alterou valores de entrega/diária', 'DOG ' + money(newRates.dog) + ' · DELL ' + money(newRates.dell) + ' · diárias ' + money(newRates.diariaAlmoco) + '/' + money(newRates.diariaTarde) + '/' + money(newRates.diariaNoite)); }
        btn.textContent = 'Salvo ✓';
        setTimeout(function(){ renderConfig(main); }, 700);
      };
    });
  }

  // ============ USUÁRIOS ============
  async function renderUsuarios(main){
    var users = await getData('users-list', []);
    var creatableRoles = user.role==='dono' ? ROLES : ROLES.filter(function(r){ return r.id==='supervisor' || r.id==='equipe' || r.id==='caixa'; });

    var html = pageHead('Usuários', user.role==='dono' ? 'Cadastro de todos os níveis, com login próprio' : 'Cadastro de Supervisor, Equipe e Caixa da sua unidade');

    html += '<div class="card">';
    html += '<div style="font-weight:600; font-size:14px;">Novo usuário</div>';
    html += '<div class="form-grid">';
    html += formField('text','u-nome','Nome','Nome completo');
    html += formField('text','u-username','Usuário (login)','ex: joao');
    html += formField('password','u-password','Senha inicial','mínimo 4 caracteres');
    html += '<div class="form-field"><label>Nível</label><select id="u-role">' + creatableRoles.map(function(r){return '<option value="'+r.id+'">'+r.label+'</option>';}).join('') + '</select></div>';
    if(user.role==='dono'){
      html += '<div class="form-field"><label>Unidade</label><select id="u-unit">' + UNITS.map(function(u2){return '<option value="'+u2.id+'">'+u2.label+'</option>';}).join('') + '</select></div>';
    }
    html += '</div>';
    html += '<div id="u-error" style="color:var(--ember); font-size:12.5px; margin-top:10px;"></div>';
    html += '<div style="margin-top:12px;"><button class="btn primary" id="u-save">Adicionar usuário</button></div>';
    html += '</div>';

    html += '<div style="height:16px"></div><div class="card">';
    var visible = user.role==='dono' ? users : users.filter(function(u2){ return u2.unit===user.unit; });
    visible = visible.filter(function(u2){ return u2.ativo!==false; });
    if(visible.length===0){
      html += '<div class="empty">Nenhum usuário cadastrado ainda.</div>';
    } else {
      html += '<table><thead><tr><th>Nome</th><th>Usuário</th><th>Nível</th><th>Unidade</th><th></th></tr></thead><tbody>';
      visible.forEach(function(u2){
        html += '<tr><td>' + escapeHtml(u2.nome) + '</td><td class="num-cell">' + escapeHtml(u2.username||'—') + '</td><td>' + labelRole(u2.role) + '</td><td>' + labelUnit(u2.unit) + '</td>' +
          '<td><button class="btn" data-reset-pw="' + u2.id + '">Redefinir senha</button> <button class="btn" data-remove-user="' + u2.id + '" style="border-color:var(--warn-txt); color:var(--warn-txt); margin-left:6px;">Revogar acesso</button></td></tr>';
      });
      html += '</tbody></table>';
    }
    html += '</div>';

    main.innerHTML = html;

    document.getElementById('u-save').onclick = async function(){
      var errEl = document.getElementById('u-error');
      errEl.textContent = '';
      var nome = document.getElementById('u-nome').value.trim();
      var username = document.getElementById('u-username').value.trim().toLowerCase();
      var password = document.getElementById('u-password').value;
      if(!nome || !username || !password){ errEl.textContent = 'Preencha nome, usuário e senha.'; return; }
      if(password.length<4){ errEl.textContent = 'Senha muito curta (mínimo 4 caracteres).'; return; }
      var role = document.getElementById('u-role').value;
      var unit = user.role==='dono' ? document.getElementById('u-unit').value : user.unit;
      var all = await getData('users-list', []);
      var dupUsername = all.some(function(u2){ return u2.ativo!==false && u2.username && u2.username.toLowerCase()===username; });
      if(dupUsername){ errEl.textContent = 'Esse nome de usuário já existe. Escolha outro.'; return; }
      var hash = await hashPassword(password);
      all.push({id:'u'+Date.now(), nome:nome, username:username, passwordHash:hash, role:role, unit:unit, ativo:true});
      var saved = await setData('users-list', all);
      if(saved){ logAudit(unit, 'Cadastrou usuário', nome + ' (' + username + ') · ' + labelRole(role)); }
      renderUsuarios(main);
    };

    main.querySelectorAll('[data-remove-user]').forEach(function(btn){
      btn.onclick = async function(){
        var id = btn.getAttribute('data-remove-user');
        if(!(await showConfirm('Revogar o acesso desta pessoa? Ela não conseguirá mais entrar no painel.', 'Revogar'))) return;
        var all = await getData('users-list', []);
        var idx = all.findIndex(function(u2){ return u2.id===id; });
        if(idx>-1){
          var nome = all[idx].nome, unit = all[idx].unit;
          all[idx].ativo = false;
          var saved = await setData('users-list', all);
          if(saved){ logAudit(unit, 'Revogou acesso de usuário', nome); }
        }
        renderUsuarios(main);
      };
    });

    main.querySelectorAll('[data-reset-pw]').forEach(function(btn){
      btn.onclick = async function(){
        var id = btn.getAttribute('data-reset-pw');
        var all = await getData('users-list', []);
        var target = all.find(function(u2){ return u2.id===id; });
        if(!target) return;
        var newPassword = await showPromptText('Nova senha para ' + target.nome + ' (mínimo 4 caracteres):', 'Redefinir', 'Nova senha');
        if(newPassword===null) return;
        if(!newPassword || newPassword.length<4){ showToast('Senha muito curta (mínimo 4 caracteres).', 'error'); return; }
        var idx = all.findIndex(function(u2){ return u2.id===id; });
        all[idx].passwordHash = await hashPassword(newPassword);
        var saved = await setData('users-list', all);
        if(saved){
          logAudit(target.unit, 'Redefiniu senha de usuário', target.nome);
          showToast('Senha de ' + target.nome + ' redefinida. Avise a pessoa da nova senha.');
        }
      };
    });
  }

  function escapeHtml(s){
    return String(s==null?'':s).replace(/[&<>"']/g, function(c){
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
    });
  }

  async function trySilentLogin(){
    var saved;
    try{ saved = JSON.parse(localStorage.getItem('cg_session') || 'null'); }catch(e){ saved = null; }
    if(!saved || !saved.username) return false;
    var all = await getData('users-list', []);
    var found = all.find(function(u){ return u.ativo!==false && u.username && u.username.toLowerCase()===saved.username.toLowerCase(); });
    if(!found){
      try{ localStorage.removeItem('cg_session'); }catch(e){}
      return false;
    }
    user = {nome:found.nome, username:found.username, role:found.role, unit:found.unit};
    await enterApp();
    return true;
  }

  (async function initApp(){
    var restored = await trySilentLogin();
    if(!restored) renderLogin();
  })();

  if('serviceWorker' in navigator){
    window.addEventListener('load', function(){
      navigator.serviceWorker.register('sw.js').catch(function(e){ console.error('sw register failed', e); });
    });
  }
})();
</script>
</body>
</html>
