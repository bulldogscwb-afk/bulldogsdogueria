<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Central de gestão</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#23201D">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Central">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/dist/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  :root{
    --ink:#23201D; --ink-2:#3A352E;
    --paper:#F7F4EE; --card:#FFFFFF;
    --ember:#C1502E; --ember-dark:#8F3A20;
    --brass:#8A6A2E; --brass-bg:#F3EBD8;
    --line:#E4DED2; --muted:#7A7367;
    --ok-bg:#E7EFE4; --ok-txt:#3A6B3F;
    --warn-bg:#FBEAE4; --warn-txt:#A6462A;
  }
  *{box-sizing:border-box;}
  h1,h2,h3,.brand,.navlabel,.stat-num{font-family:'Space Grotesk',sans-serif;}
  body,.body-font{font-family:'Inter',sans-serif;}
  .mono{font-family:'IBM Plex Mono',monospace;}
  #app-root{color:var(--ink); background:var(--paper); min-height:100%; font-family:'Inter',sans-serif; font-size:14px;}
  button{font-family:inherit; cursor:pointer;}
  input,select,textarea{font-family:inherit; font-size:13px;}

  /* ---------- LOGIN ---------- */
  #view-login{min-height:640px; display:flex; align-items:center; justify-content:center; padding:40px 20px;}
  .login-card{width:100%; max-width:420px; background:var(--card); border:1px solid var(--line); border-radius:14px; padding:36px 32px;}
  .login-ticket{border-bottom:2px dashed var(--line); padding-bottom:18px; margin-bottom:22px;}
  .login-eyebrow{font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:var(--ember); font-weight:600;}
  .login-title{font-size:24px; font-weight:700; margin-top:6px; line-height:1.2;}
  .field-label{font-size:12px; font-weight:600; color:var(--ink-2); margin:16px 0 8px;}
  .opt-row{display:flex; flex-wrap:wrap; gap:8px;}
  .opt-btn{flex:1; min-width:120px; padding:10px 12px; border-radius:8px; border:1px solid var(--line); background:var(--paper); color:var(--ink-2); font-size:13px; font-weight:500; text-align:left; transition:.15s;}
  .opt-btn:hover{border-color:var(--ember);}
  .opt-btn.active{background:var(--ink); border-color:var(--ink); color:#fff;}
  .btn-primary{width:100%; margin-top:24px; background:var(--ember); color:#fff; border:none; padding:13px; border-radius:8px; font-weight:600; font-size:14px; transition:.15s;}
  .btn-primary:hover{background:var(--ember-dark);}
  .btn-primary:disabled{background:var(--line); color:var(--muted); cursor:not-allowed;}

  /* ---------- APP SHELL ---------- */
  #view-app{display:none;}
  .shell{display:flex; min-height:640px;}
  .sidebar{width:230px; flex-shrink:0; background:var(--ink); color:#EDE9E1; padding:22px 16px; display:flex; flex-direction:column;}
  .brand{font-size:16px; font-weight:700; letter-spacing:.02em;}
  .brand-sub{font-size:10.5px; color:#B7B0A2; margin-top:3px; letter-spacing:.06em; text-transform:uppercase;}
  .nav{margin-top:28px; display:flex; flex-direction:column; gap:2px; flex:1;}
  .navitem{display:flex; align-items:center; gap:9px; padding:10px 10px; border-radius:7px; border:none; background:transparent; color:#CFC9BC; font-size:13.5px; font-weight:500; text-align:left;}
  .navitem i{font-size:16px; width:16px;}
  .navitem:hover{background:#332E27; color:#fff;}
  .navitem.active{background:var(--ember); color:#fff;}
  .side-user{border-top:1px solid #3A352C; padding-top:14px; font-size:12px; color:#B7B0A2;}
  .side-user b{color:#fff; display:block; font-size:13px; margin-bottom:2px;}
  .switch-btn{margin-top:10px; width:100%; background:transparent; border:1px solid #4A453B; color:#CFC9BC; padding:8px; border-radius:7px; font-size:12px;}
  .switch-btn:hover{border-color:var(--ember); color:#fff;}

  .main{flex:1; padding:28px 32px; min-width:0; max-width:100%;}
  .page-head{display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:22px; flex-wrap:wrap; gap:10px;}
  .page-title{font-size:21px; font-weight:700;}
  .page-sub{font-size:12.5px; color:var(--muted); margin-top:3px;}

  .card{background:var(--card); border:1px solid var(--line); border-radius:12px; padding:20px; max-width:100%;}
  .grid-2{display:grid; grid-template-columns:1fr 1fr; gap:16px;}
  .grid-4{display:grid; grid-template-columns:repeat(4,1fr); gap:14px;}
  @media (max-width:820px){.grid-2,.grid-4{grid-template-columns:1fr;}}

  .stat-card{background:var(--card); border:1px solid var(--line); border-radius:12px; padding:16px 18px;}
  .stat-label{font-size:11.5px; color:var(--muted); font-weight:500; text-transform:uppercase; letter-spacing:.04em;}
  .stat-num{font-size:24px; font-weight:700; margin-top:6px;}
  .stat-num.mono{font-family:'IBM Plex Mono',monospace;}

  .bar-row{display:flex; align-items:center; gap:12px; margin-top:14px;}
  .bar-label{width:80px; font-size:12.5px; font-weight:600; flex-shrink:0;}
  .bar-track{flex:1; background:var(--paper); border-radius:6px; height:22px; overflow:hidden; border:1px solid var(--line);}
  .bar-fill{height:100%; background:var(--brass);}
  .bar-fill.ember{background:var(--ember);}
  .bar-val{width:90px; text-align:right; font-size:12.5px; font-weight:600;}

  .table-scroll{overflow-x:auto; max-width:100%; -webkit-overflow-scrolling:touch;}
  table{width:100%; border-collapse:collapse; font-size:13px;}
  th{text-align:left; font-size:11px; text-transform:uppercase; letter-spacing:.03em; color:var(--muted); font-weight:600; padding:8px 10px; border-bottom:1px solid var(--line); white-space:nowrap;}
  td{padding:9px 10px; border-bottom:1px solid var(--line); white-space:nowrap;}
  tr:last-child td{border-bottom:none;}
  .num-cell{font-family:'IBM Plex Mono',monospace; font-size:12.5px;}

  .lock-badge{display:inline-flex; align-items:center; gap:5px; font-size:11.5px; background:var(--brass-bg); color:var(--brass); padding:4px 9px; border-radius:20px; font-weight:600;}

  .form-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-top:14px;}
  @media (max-width:820px){.form-grid{grid-template-columns:repeat(2,1fr);}}
  @media (max-width:520px){.form-grid{grid-template-columns:1fr;}}
  .form-field label{display:block; font-size:11.5px; color:var(--muted); font-weight:600; margin-bottom:5px;}
  .form-field input,.form-field select{width:100%; padding:8px 9px; border:1px solid var(--line); border-radius:7px; background:var(--paper);}

  /* ---------- MOBILE NAV (barra superior + gaveta) ---------- */
  .mobile-topbar{display:none;}
  .mobile-overlay{display:none;}
  @media (max-width:860px){
    .mobile-topbar{
      display:flex; align-items:center; gap:12px; background:var(--ink); color:#fff;
      padding:14px 16px; position:sticky; top:0; z-index:40;
    }
    .mobile-menu-btn{background:transparent; border:1px solid #4A453B; color:#fff; border-radius:8px; padding:7px 10px; font-size:18px; line-height:1;}
    .shell{position:relative;}
    .sidebar{
      position:fixed; top:0; left:0; height:100%; z-index:60;
      transform:translateX(-100%); transition:transform .22s ease; box-shadow:8px 0 24px rgba(0,0,0,.25);
      width:240px;
    }
    .sidebar.mobile-open{transform:translateX(0);}
    .mobile-overlay.show{
      display:block; position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:50;
    }
    .main{padding:18px 14px;}
    .page-title{font-size:18px;}
    table{font-size:12px;}
    th, td{padding:7px 8px;}
  }
  .form-field input:focus,.form-field select:focus,.form-field textarea:focus{outline:2px solid var(--ember); outline-offset:1px; border-color:var(--ember);}

  .grid-input{width:58px; padding:6px 7px; border:1px solid var(--line); border-radius:6px; background:var(--paper); font-family:'IBM Plex Mono',monospace; font-size:12.5px;}
  .grid-input.wide{width:150px; font-family:'Inter',sans-serif; font-size:13px;}
  .grid-input.money{width:82px;}
  .grid-select{padding:6px 6px; border:1px solid var(--line); border-radius:6px; background:var(--paper); font-size:11.5px; width:96px;}
  .grid-input:focus,.grid-select:focus{outline:2px solid var(--ember); outline-offset:1px; border-color:var(--ember);}
  .grid-table td{padding:6px 8px; vertical-align:middle;}
  .total-cell{font-weight:700; font-family:'IBM Plex Mono',monospace; white-space:nowrap;}
  .add-row-bar{display:flex; gap:8px; align-items:center; margin-top:12px; padding-top:12px; border-top:1px dashed var(--line);}

  .kv-row{display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid var(--line);}
  .kv-row:last-child{border-bottom:none;}
  .kv-label{font-size:13px; color:var(--ink-2); font-weight:500;}
  .kv-sub{font-size:11px; color:var(--muted);}
  .kv-input{width:130px; padding:8px 9px; border:1px solid var(--line); border-radius:7px; background:var(--paper); font-family:'IBM Plex Mono',monospace; text-align:right;}
  .kv-value{font-family:'IBM Plex Mono',monospace; font-size:14px; font-weight:600;}
  .saldo-pill{display:inline-flex; padding:6px 12px; border-radius:20px; font-weight:700; font-family:'IBM Plex Mono',monospace; font-size:13px;}
  .saldo-pill.pos{background:var(--ok-bg); color:var(--ok-txt);}
  .saldo-pill.neg{background:var(--warn-bg); color:var(--warn-txt);}

  .schedule-table{width:100%; border-collapse:collapse; font-size:12px;}
  .schedule-table th,.schedule-table td{border:1px solid var(--line); padding:6px; vertical-align:top;}
  .schedule-table th{background:var(--paper); font-size:10px; text-transform:uppercase; letter-spacing:.03em; color:var(--muted); font-weight:600;}
  .sched-chips{display:flex; flex-wrap:wrap; gap:4px; min-height:20px;}
  .chip{display:inline-flex; align-items:center; gap:5px; background:var(--brass-bg); color:var(--brass); padding:3px 8px; border-radius:14px; font-size:11px; font-weight:600;}
  .chip button{background:none; border:none; color:inherit; cursor:pointer; font-size:13px; line-height:1; padding:0;}
  .schedule-cell-add{margin-top:5px; display:flex; gap:4px;}
  .schedule-cell-add input{width:100%; font-size:11px; padding:5px 6px; border:1px solid var(--line); border-radius:5px; background:var(--paper);}
  .sched-add-btn{flex-shrink:0; font-size:10.5px; padding:5px 7px; border-radius:5px; border:1px solid var(--line); background:var(--card); color:var(--ink-2); font-weight:600;}
  .sched-add-btn:hover{border-color:var(--ember); color:var(--ember);}

  .btn{padding:9px 16px; border-radius:8px; border:1px solid var(--line); background:var(--card); font-size:13px; font-weight:600; color:var(--ink-2);}
  .btn:hover{border-color:var(--ink-2);}
  .btn.primary{background:var(--ember); border-color:var(--ember); color:#fff;}
  .btn.primary:hover{background:var(--ember-dark);}

  .unit-toggle{display:flex; gap:6px; background:var(--card); border:1px solid var(--line); border-radius:9px; padding:4px;}
  .unit-toggle button{padding:6px 12px; border-radius:6px; border:none; background:transparent; font-size:12.5px; font-weight:600; color:var(--muted);}
  .unit-toggle button.active{background:var(--ink); color:#fff;}

  .empty{padding:30px; text-align:center; color:var(--muted); font-size:13px;}

  .item-row{padding:14px 0; border-bottom:1px solid var(--line);}
  .item-row:last-child{border-bottom:none;}
  .item-title{font-weight:600; font-size:14px;}
  .item-body{font-size:13px; color:var(--ink-2); margin-top:5px; white-space:pre-wrap; line-height:1.6;}
  .item-meta{font-size:11px; color:var(--muted); margin-top:4px;}

  .toggle-pill{display:inline-flex; align-items:center; gap:8px; padding:8px 14px; border-radius:20px; font-size:13px; font-weight:600; border:none;}
  .toggle-pill.on{background:var(--ok-bg); color:var(--ok-txt);}
  .toggle-pill.off{background:var(--warn-bg); color:var(--warn-txt);}

  .sr-only{position:absolute; width:1px; height:1px; padding:0; margin:-1px; overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; border:0;}

  .toast{position:fixed; bottom:20px; right:20px; background:var(--ink); color:#fff; padding:12px 16px; border-radius:8px; font-size:13px; font-weight:500; box-shadow:0 6px 18px rgba(0,0,0,.2); opacity:0; transform:translateY(10px); transition:opacity .25s, transform .25s; z-index:9999; max-width:300px; line-height:1.4;}
  .toast.show{opacity:1; transform:translateY(0);}
  .toast.error{background:var(--ember-dark);}

  .confirm-overlay{position:fixed; inset:0; background:rgba(35,32,29,0.55); display:flex; align-items:center; justify-content:center; z-index:10000; padding:20px;}
  .confirm-box{background:var(--card); border-radius:12px; padding:22px; max-width:380px; width:100%; box-shadow:0 10px 30px rgba(0,0,0,.25);}
  .confirm-msg{font-size:14px; color:var(--ink); line-height:1.6; margin-bottom:18px;}
  .confirm-actions{display:flex; justify-content:flex-end; gap:8px;}
</style>
</head>
<body>

<div id="app-root">

  <!-- ============ LOGIN ============ -->
  <div id="view-login">
    <div class="login-card" id="login-card-inner"></div>
  </div>

  <!-- ============ APP ============ -->
  <div id="view-app">
    <div class="mobile-topbar">
      <button class="mobile-menu-btn" id="mobile-menu-btn" aria-label="Abrir menu"><i class="ti ti-menu-2" aria-hidden="true"></i></button>
      <div class="brand" style="font-size:14px;">Central de gestão</div>
    </div>
    <div class="mobile-overlay" id="mobile-overlay"></div>
    <div class="shell">
      <div class="sidebar" id="sidebar">
        <div class="brand">Central de gestão</div>
        <div class="brand-sub">Painel multi-unidade</div>
        <div class="nav" id="nav-list"></div>
        <div class="side-user">
          <b id="side-user-nome">—</b>
          <span id="side-user-role">—</span><br>
          <span id="side-user-unit">—</span>
          <button class="switch-btn" id="btn-switch">Trocar usuário</button>
        </div>
      </div>
      <div class="main" id="main-content"></div>
    </div>
  </div>

</div>

<script>
(function(){

  // ============ CONEXÃO COM O BANCO DE DADOS (Supabase) ============
  // Cole aqui a URL e a chave "anon public" do seu projeto Supabase.
  // Onde encontrar: no painel do Supabase, vá em Project Settings > API.
  var SUPABASE_URL = 'https://tvhsuhtqkanaupelklwk.supabase.co';
  var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR2aHN1aHRxa2FuYXVwZWxrbHdrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI4NzEzNDAsImV4cCI6MjA5ODQ0NzM0MH0.wn95mXhYlquto910_TNn7_Do5RQlr5MgCQmEpaumcxo';
  var sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // ============ CONEXÃO COM O GOOGLE DRIVE ============
  // Cole aqui o Client ID que você criar no Google Cloud Console.
  // Onde encontrar: console.cloud.google.com > APIs e Serviços > Credenciais.
  var GOOGLE_CLIENT_ID = '244937451068-rt4g68hlk48obv0ap4ae15s1ocmde4jp.apps.googleusercontent.com';
  // ID da pasta do Drive que abre por padrão (o trecho depois de /folders/ no link da pasta).
  var DEFAULT_DRIVE_FOLDER_ID = '1h_shcgqQsmiYIVXoSiBc8lRu6vJEAOzV';
  var driveAccessToken = null;

  var UNITS = [
    {id:'unidade1', label:'Unidade 1'},
    {id:'unidade2', label:'Unidade 2'}
  ];
  var ROLES = [
    {id:'dono', label:'Dono / central'},
    {id:'gerente', label:'Gerente'},
    {id:'supervisor', label:'Supervisor'},
    {id:'equipe', label:'Equipe'},
    {id:'caixa', label:'Caixa'}
  ];
  var NAV = [
    {id:'dashboard', label:'Visão geral', icon:'ti-chart-bar', roles:['dono','gerente']},
    {id:'motoboys', label:'Motoboys', icon:'ti-motorbike', roles:['dono','gerente','supervisor','caixa']},
    {id:'fechamento', label:'Fechamento de caixa', icon:'ti-cash', roles:['dono','gerente','caixa']},
    {id:'documentos', label:'Documentos', icon:'ti-folder', roles:['dono','gerente']},
    {id:'conteudo', label:'Receitas & Processos', icon:'ti-book-2', roles:['dono','gerente','supervisor','equipe','caixa']},
    {id:'checklists', label:'Checklists', icon:'ti-checkbox', roles:['dono','gerente','supervisor','equipe']},
    {id:'avaliacoes', label:'Avaliações', icon:'ti-star', roles:['dono','gerente','supervisor']},
    {id:'auditoria', label:'Auditoria', icon:'ti-history', roles:['dono','gerente']},
    {id:'config', label:'Configurações', icon:'ti-settings', roles:['dono']},
    {id:'usuarios', label:'Usuários', icon:'ti-users', roles:['dono','gerente']}
  ];
  var DEFAULT_RATES = {dog:8, dell:6, rtDog:4, rtDell:3, diariaAlmoco:10, diariaTarde:10, diariaNoite:0};
  var TURNOS = [
    {id:'almoco', label:'Almoço'},
    {id:'tarde', label:'Tarde'},
    {id:'noite', label:'Noite'}
  ];
  var WEEKDAYS = [
    {id:'dom', label:'Domingo', short:'Dom', js:0},
    {id:'seg', label:'Segunda', short:'Seg', js:1},
    {id:'ter', label:'Terça', short:'Ter', js:2},
    {id:'qua', label:'Quarta', short:'Qua', js:3},
    {id:'qui', label:'Quinta', short:'Qui', js:4},
    {id:'sex', label:'Sexta', short:'Sex', js:5},
    {id:'sab', label:'Sábado', short:'Sáb', js:6}
  ];
  var WEEKDAY_DISPLAY_ORDER = ['seg','ter','qua','qui','sex','sab','dom'];
  function weekdayIdForDate(dateStr){
    var d = new Date(dateStr + 'T00:00:00');
    var js = d.getDay();
    return WEEKDAYS.find(function(w){ return w.js===js; }).id;
  }
  function turnoLabel(id){ var t = TURNOS.find(function(x){ return x.id===id; }); return t ? t.label : id; }
  function weekdayLabel(id){ var w = WEEKDAYS.find(function(x){ return x.id===id; }); return w ? w.label : id; }

  var user = null; // {nome, unit, role}
  var currentPage = 'dashboard';

  // ---------- storage helpers ----------
  var __cache = {};
  async function getData(key, fallback){
    if(Object.prototype.hasOwnProperty.call(__cache, key)){
      return JSON.parse(JSON.stringify(__cache[key]));
    }
    for(var attempt=0; attempt<2; attempt++){
      try{
        var res = await sb.from('kv_store').select('value').eq('key', key).maybeSingle();
        if(res.error) throw res.error;
        var val = (res.data && res.data.value !== undefined) ? res.data.value : fallback;
        __cache[key] = val;
        return JSON.parse(JSON.stringify(val));
      }catch(e){
        console.error('read error', key, e);
        if(attempt===0) await sleep(400);
      }
    }
    return fallback;
  }
  async function setData(key, value){
    __cache[key] = value;
    for(var attempt=0; attempt<3; attempt++){
      try{
        var res = await sb.from('kv_store').upsert({key: key, value: value, updated_at: new Date().toISOString()});
        if(res.error) throw res.error;
        return true;
      }catch(e){ console.error('storage error', key, e); }
      if(attempt<2) await sleep(500*(attempt+1));
    }
    showToast('Não foi possível salvar sua última alteração. Verifique sua conexão e tente de novo.', 'error');
    return false;
  }
  function sleep(ms){ return new Promise(function(r){ setTimeout(r, ms); }); }

  async function logAudit(unit, action, details){
    try{
      var log = await getData('audit-log', []);
      var isKnownUnit = UNITS.some(function(u){ return u.id===unit; });
      log.push({
        id: 'a' + Date.now() + Math.random().toString(16).slice(2),
        ts: new Date().toISOString(),
        role: (user.nome ? user.nome + ' (' + labelRole(user.role) + ')' : labelRole(user.role)),
        unit: isKnownUnit ? labelUnit(unit) : (unit || 'Ambas as unidades'),
        action: action,
        details: details || ''
      });
      if(log.length > 500) log = log.slice(log.length - 500);
      await setData('audit-log', log);
    }catch(e){ console.error('audit log error', e); }
  }
  function showToast(msg, type){
    var t = document.createElement('div');
    t.className = 'toast' + (type ? ' ' + type : '');
    t.textContent = msg;
    document.body.appendChild(t);
    requestAnimationFrame(function(){ t.classList.add('show'); });
    setTimeout(function(){
      t.classList.remove('show');
      setTimeout(function(){ t.remove(); }, 300);
    }, 4000);
  }
  function showConfirm(message, confirmLabel){
    return new Promise(function(resolve){
      var overlay = document.createElement('div');
      overlay.className = 'confirm-overlay';
      overlay.innerHTML =
        '<div class="confirm-box">' +
          '<div class="confirm-msg"></div>' +
          '<div class="confirm-actions">' +
            '<button class="btn" id="confirm-cancel-btn">Cancelar</button>' +
            '<button class="btn primary" id="confirm-ok-btn">' + (confirmLabel || 'Confirmar') + '</button>' +
          '</div>' +
        '</div>';
      overlay.querySelector('.confirm-msg').textContent = message;
      document.body.appendChild(overlay);
      function close(result){ overlay.remove(); resolve(result); }
      overlay.querySelector('#confirm-cancel-btn').onclick = function(){ close(false); };
      overlay.querySelector('#confirm-ok-btn').onclick = function(){ close(true); };
      overlay.addEventListener('click', function(ev){ if(ev.target===overlay) close(false); });
    });
  }

  function showPromptText(message, confirmLabel, placeholder){
    return new Promise(function(resolve){
      var overlay = document.createElement('div');
      overlay.className = 'confirm-overlay';
      overlay.innerHTML =
        '<div class="confirm-box">' +
          '<div class="confirm-msg"></div>' +
          '<input type="text" id="prompt-input" class="kv-input" style="width:100%; text-align:left; margin-bottom:16px;" placeholder="' + (placeholder||'') + '">' +
          '<div class="confirm-actions">' +
            '<button class="btn" id="confirm-cancel-btn">Cancelar</button>' +
            '<button class="btn primary" id="confirm-ok-btn">' + (confirmLabel || 'Confirmar') + '</button>' +
          '</div>' +
        '</div>';
      overlay.querySelector('.confirm-msg').textContent = message;
      document.body.appendChild(overlay);
      var input = overlay.querySelector('#prompt-input');
      input.focus();
      function close(result){ overlay.remove(); resolve(result); }
      overlay.querySelector('#confirm-cancel-btn').onclick = function(){ close(null); };
      overlay.querySelector('#confirm-ok-btn').onclick = function(){ close(input.value); };
      input.addEventListener('keydown', function(ev){ if(ev.key==='Enter') close(input.value); });
      overlay.addEventListener('click', function(ev){ if(ev.target===overlay) close(null); });
    });
  }

  function labelUnit(id){ var u = UNITS.find(function(x){return x.id===id;}); return u ? u.label : 'Todas as unidades'; }
  function labelRole(id){ return ROLES.find(function(r){return r.id===id;}).label; }
  function money(v){ return 'R$ ' + (Math.round((v||0)*100)/100).toFixed(2).replace('.',','); }
  function todayISO(){ return new Date().toISOString().slice(0,10); }
  function isoDate(d){ return d.toISOString().slice(0,10); }
  function weekDefaultRange(){
    var now = new Date();
    var day = now.getDay();
    var diffToMonday = (day===0 ? -6 : 1-day);
    var monday = new Date(now); monday.setDate(now.getDate()+diffToMonday);
    var sunday = new Date(monday); sunday.setDate(monday.getDate()+6);
    return {start: isoDate(monday), end: isoDate(sunday)};
  }

  async function hashPassword(pw){
    var enc = new TextEncoder().encode(pw);
    var buf = await crypto.subtle.digest('SHA-256', enc);
    return Array.from(new Uint8Array(buf)).map(function(b){ return b.toString(16).padStart(2,'0'); }).join('');
  }

  function setupTableScroll(){

        wrap.className = 'table-scroll';
        t.parentNode.insertBefore(wrap, t);

  // ============ DASHBOARD ============
  async function renderDashboard(main){
    var dLoaded = await Promise.all([
      getData('motoboys-entries', []),
      getData('rates-unidade1', DEFAULT_RATES),
      getData('rates-unidade2', DEFAULT_RATES)
    ]);
    var entries = dLoaded[0];
    var rates = {unidade1: dLoaded[1], unidade2: dLoaded[2]};

    function unitTotals(unitId){
      var list = entries.filter(function(e){ return e.unit===unitId; });
      var r = rates[unitId];
      var totalPago = 0, totalEntregas = 0;
      list.forEach(function(e){
        totalPago += calcTotal(e, r);
        totalEntregas += (e.dog||0)+(e.dell||0)+(e.rtDog||0)+(e.rtDell||0);
      });
      return {count:list.length, totalPago:totalPago, totalEntregas:totalEntregas};
    }

    var t1 = unitTotals('unidade1');
    var t2 = unitTotals('unidade2');
    var maxPago = Math.max(t1.totalPago, t2.totalPago, 1);

    var html = pageHead('Visão geral', user.role==='dono' ? 'Comparativo entre as duas unidades' : 'Sua unidade, com comparativo somente leitura');

    html += '<div class="grid-4">';
    html += statCard('Lançamentos · Unidade 1', t1.count, false);
    html += statCard('Entregas · Unidade 1', t1.totalEntregas, false);
    html += statCard('Lançamentos · Unidade 2', t2.count, false);
    html += statCard('Entregas · Unidade 2', t2.totalEntregas, false);
    html += '</div>';

    html += '<div style="height:16px"></div>';
    html += '<div class="card">';
    html += '<div style="font-weight:600; font-size:14px; margin-bottom:2px;">Total pago a motoboys (acumulado)</div>';
    html += '<div style="font-size:12px; color:var(--muted);">' + (user.role!=='dono' ? '<span class="lock-badge"><i class="ti ti-lock" aria-hidden="true"></i> Comparativo somente leitura</span>' : 'Some de todos os lançamentos registrados') + '</div>';
    html += barRow('Unidade 1', t1.totalPago, maxPago, 'ember');
    html += barRow('Unidade 2', t2.totalPago, maxPago, '');
    html += '</div>';

    main.innerHTML = html;
  }

  function statCard(label, value, isMoney){
    return '<div class="stat-card"><div class="stat-label">' + label + '</div><div class="stat-num mono">' + (isMoney ? money(value) : value) + '</div></div>';
  }
  function barRow(label, value, max, cls){
    var pct = Math.round((value/max)*100);
    return '<div class="bar-row"><div class="bar-label">' + label + '</div><div class="bar-track"><div class="bar-fill ' + cls + '" style="width:' + pct + '%"></div></div><div class="bar-val mono">' + money(value) + '</div></div>';
  }

  // ============ MOTOBOYS ============
  function diariaForTurno(rates, turno){
    if(turno==='almoco') return rates.diariaAlmoco||0;
    if(turno==='tarde') return rates.diariaTarde||0;
    if(turno==='noite') return rates.diariaNoite||0;
    return 0;
  }
  function calcTotal(e, rates){
    var ganho = (e.dog||0)*rates.dog + (e.dell||0)*rates.dell + (e.rtDog||0)*rates.rtDog + (e.rtDell||0)*rates.rtDell;
    var diaria = diariaForTurno(rates, e.turno);
    return ganho + diaria + (e.gorjeta||0) - (e.dinheiro||0) - (e.produtos||0);
  }

  async function renderMotoboys(main){
    if(user.role==='dono' || user.role==='gerente'){
      var mode = window.__mrMode || 'report';
      var tabs = '<div class="unit-toggle" style="margin-bottom:14px; width:fit-content;">' +
        '<button id="mb-tab-report" class="' + (mode==='report'?'active':'') + '">Fechamento semanal</button>' +
        '<button id="mb-tab-daily" class="' + (mode==='daily'?'active':'') + '">Conferir lançamento diário</button>' +
        '</div>';
      main.innerHTML = tabs + '<div id="mb-tab-content"></div>';
      document.getElementById('mb-tab-report').onclick = function(){ window.__mrMode = 'report'; renderMotoboys(main); };
      document.getElementById('mb-tab-daily').onclick = function(){ window.__mrMode = 'daily'; renderMotoboys(main); };
      var content = document.getElementById('mb-tab-content');
      if(mode==='daily'){ await renderMotoboysDaily(content); } else { await renderMotoboysReport(content); }
    } else {
      await renderMotoboysDaily(main);
    }
  }

  function turnoStatusKey(unit,date,turno){ return unit + '_' + date + '_' + turno; }
  function fmtDateTime(iso){
    var d = new Date(iso);
    return d.toLocaleDateString('pt-BR') + ' ' + d.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});
  }

  async function renderMotoboysDaily(main){
    var isManagerRole = (user.role==='dono' || user.role==='gerente');
    var canPickUnit = user.role==='dono';
    var viewUnit = canPickUnit ? (window.__mbUnit || 'unidade1') : user.unit;
    window.__mbUnit = viewUnit;
    var viewDate = window.__mbDate || todayISO();
    var viewTurno = window.__mbTurno || 'almoco';

    var weekday = weekdayIdForDate(viewDate);
    var loaded = await Promise.all([
      getData('motoboys-entries', []),
      getData('rates-' + viewUnit, DEFAULT_RATES),
      getData('motoboy-schedule', []),
      getData('motoboy-cadastro', []),
      getData('motoboys-turno-status', {})
    ]);
    var allEntries = loaded[0];
    var rates = loaded[1];
    var fullSchedule = loaded[2].filter(function(s){ return s.unit===viewUnit; });
    var schedule = fullSchedule.filter(function(s){
      return s.weekday===weekday && s.turno===viewTurno;
    });
    var cadastro = loaded[3].filter(function(m){ return m.ativo!==false; });

    var statusAll = loaded[4];
    var statusKey = turnoStatusKey(viewUnit, viewDate, viewTurno);
    var turnoStatus = statusAll[statusKey] || null;
    var locked = !!(turnoStatus && turnoStatus.closed);
    var readOnly = locked && !isManagerRole;

    // Auto-provisiona uma linha para cada motoboy escalado neste dia da semana + turno
    var dirty = false;
    schedule.forEach(function(s){
      var exists = allEntries.some(function(e){
        return e.unit===viewUnit && e.date===viewDate && e.turno===viewTurno && e.nome.trim().toLowerCase()===s.nome.trim().toLowerCase();
      });
      if(!exists){
        allEntries.push({id:'e'+Date.now()+Math.random().toString(16).slice(2), unit:viewUnit, date:viewDate, turno:viewTurno, nome:s.nome, origem:'fixo', dog:0, dell:0, rtDog:0, rtDell:0, produtos:0, dinheiro:0, gorjeta:0});
        dirty = true;
      }
    });
    if(dirty && !locked) await setData('motoboys-entries', allEntries);

    var rows = allEntries.filter(function(e){ return e.unit===viewUnit && e.date===viewDate && e.turno===viewTurno; });

    function readRow(tr){
      function n(field){ return parseFloat(tr.querySelector('[data-field="'+field+'"]').value) || 0; }
      return {
        nome: tr.querySelector('[data-field="nome"]').value.trim(),
        origem: tr.querySelector('[data-field="origem"]').value,
        dog:n('dog'), dell:n('dell'), rtDog:n('rtDog'), rtDell:n('rtDell'),
        produtos:n('produtos'), dinheiro:n('dinheiro'), gorjeta:n('gorjeta')
      };
    }

    var diariaAtual = diariaForTurno(rates, viewTurno);
    var html = pageHead('Motoboys', weekdayLabel(weekday) + ' · ' + turnoLabel(viewTurno) + ' já vem da escala semanal');

    if(canPickUnit){
      html += '<div class="unit-toggle" style="margin-bottom:14px; width:fit-content;">';
      UNITS.forEach(function(u){
        html += '<button data-unit="' + u.id + '" class="' + (viewUnit===u.id?'active':'') + '">' + u.label + '</button>';
      });
      html += '</div>';
    }

    html += '<div class="unit-toggle" style="margin-bottom:14px; width:fit-content;">';
    TURNOS.forEach(function(t){
      html += '<button data-turno="' + t.id + '" class="' + (viewTurno===t.id?'active':'') + '">' + t.label + '</button>';
    });
    html += '</div>';

    if(locked){
      html += '<div class="card" style="margin-bottom:14px; background:var(--warn-bg); border-color:var(--warn-txt);">';
      html += '<div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px;">';
      html += '<div style="font-size:13px; color:var(--warn-txt); font-weight:600;"><i class="ti ti-lock" aria-hidden="true"></i> Lançamento finalizado por ' + escapeHtml(turnoStatus.closedBy) + ' em ' + fmtDateTime(turnoStatus.closedAt) + (isManagerRole ? ' · você pode editar por ser Dono/Gerente' : ' · somente Dono/Gerente podem editar agora') + '</div>';
      if(isManagerRole){ html += '<button class="btn" id="mb-reopen">Reabrir para edição</button>'; }
      html += '</div></div>';
    }

    html += '<div class="card">';
    html += '<div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:12px;">';
    html += '<div><div style="font-weight:600; font-size:14px;">' + labelUnit(viewUnit) + ' · ' + turnoLabel(viewTurno) + '</div>';
    html += '<div style="font-size:11.5px; color:var(--muted); margin-top:2px;">DOG ' + money(rates.dog) + ' · DELL ' + money(rates.dell) + ' · rt.DOG ' + money(rates.rtDog) + ' · rt.DELL ' + money(rates.rtDell) + ' · diária deste turno ' + money(diariaAtual) + '</div></div>';
    html += '<div class="form-field" style="margin:0;"><label for="mb-date">Data</label><input type="date" id="mb-date" value="' + viewDate + '"></div>';
    html += '</div>';

    html += '<div style="overflow-x:auto; margin-top:14px;"><table class="grid-table"><thead><tr>' +
      '<th>Motoboy</th><th>Origem</th><th>Dog</th><th>Dell</th><th>Rt.dog</th><th>Rt.dell</th><th>Produtos R$</th><th>Dinheiro R$</th><th>Gorjeta R$</th><th>Total a receber</th></tr></thead><tbody id="mb-tbody">';

    rows.forEach(function(e){ html += motoboyRowHtml(e, money(calcTotal(e, rates)), readOnly); });
    html += '</tbody></table></div>';

    if(rows.length===0){
      html += '<div class="empty">Ninguém escalado para ' + weekdayLabel(weekday) + ' · ' + turnoLabel(viewTurno) + '.' +
        (fullSchedule.length===0
          ? ' Não há nenhuma escala cadastrada ainda nesta unidade — peça ao Dono/Gerente pra montar em Motoboys → Escala semanal.'
          : ' Essa unidade tem ' + fullSchedule.length + ' escalação(ões) cadastrada(s), mas nenhuma cai neste dia+turno. Confira o dia da semana e o turno certos com o Dono/Gerente.') +
        '</div>';
    }

    if(!readOnly){
      html += '<div class="add-row-bar">';
      if(cadastro.length===0){
        html += '<span style="font-size:12px; color:var(--muted);">Nenhum motoboy cadastrado ainda — peça ao Dono para cadastrar em Configurações → Cadastro de motoboys.</span>';
      } else {
        html += '<select class="grid-select" style="width:200px;" id="mb-new-nome"><option value="">Selecionar motoboy extra…</option>';
        cadastro.forEach(function(m){ html += '<option value="' + escapeHtml(m.nome) + '">' + escapeHtml(m.nome) + '</option>'; });
        html += '</select>';
        html += '<button class="btn primary" id="mb-add-row">Adicionar linha</button>';
      }
      html += '</div>';

      html += '<div class="add-row-bar" style="justify-content:flex-end;">';
      html += '<button class="btn" id="mb-finalize" style="border-color:var(--ember); color:var(--ember);"><i class="ti ti-lock" aria-hidden="true"></i> Finalizar lançamento</button>';
      html += '</div>';
    }
    html += '</div>';

    main.innerHTML = html;

    if(canPickUnit){
      main.querySelectorAll('.unit-toggle button[data-unit]').forEach(function(b){
        b.onclick = function(){ window.__mbUnit = b.getAttribute('data-unit'); renderMotoboysDaily(main); };
      });
    }
    main.querySelectorAll('.unit-toggle button[data-turno]').forEach(function(b){
      b.onclick = function(){ window.__mbTurno = b.getAttribute('data-turno'); renderMotoboysDaily(main); };
    });
    document.getElementById('mb-date').onchange = function(ev){
      window.__mbDate = ev.target.value || todayISO();
      renderMotoboysDaily(main);
    };

    var reopenBtn = document.getElementById('mb-reopen');
    if(reopenBtn){
      reopenBtn.onclick = async function(){
        var all = await getData('motoboys-turno-status', {});
        delete all[statusKey];
        var saved = await setData('motoboys-turno-status', all);
        if(saved){ logAudit(viewUnit, 'Reabriu lançamento de motoboys', turnoLabel(viewTurno) + ' · ' + viewDate); }
        renderMotoboysDaily(main);
      };
    }

    var finalizeBtn = document.getElementById('mb-finalize');
    if(finalizeBtn){
      finalizeBtn.onclick = async function(){
        if(!(await showConfirm('Finalizar o lançamento de ' + turnoLabel(viewTurno) + ' de ' + weekdayLabel(weekday) + '? Depois disso só Dono ou Gerente podem editar.', 'Finalizar'))) return;
        var all = await getData('motoboys-turno-status', {});
        all[statusKey] = {closed:true, closedBy:labelRole(user.role), closedAt:new Date().toISOString()};
        var saved = await setData('motoboys-turno-status', all);
        if(!saved) return;
        logAudit(viewUnit, 'Finalizou lançamento de motoboys', turnoLabel(viewTurno) + ' · ' + viewDate);
        finalizeBtn.innerHTML = '<i class="ti ti-check" aria-hidden="true"></i> Lançamento finalizado ✓';
        finalizeBtn.disabled = true;
        setTimeout(function(){ renderMotoboysDaily(main); }, 900);
      };
    }

    function wireRow(tr){
      tr.querySelectorAll('input,select').forEach(function(inp){
        inp.addEventListener('input', function(){
          var vals = readRow(tr);
          vals.turno = viewTurno;
          tr.querySelector('.total-cell').textContent = money(calcTotal(vals, rates));
        });
        inp.addEventListener('change', async function(){
          var vals = readRow(tr);
          var id = tr.getAttribute('data-id');
          var all = await getData('motoboys-entries', []);
          var idx = all.findIndex(function(x){ return x.id===id; });
          if(idx===-1) return;
          var before = {dog:all[idx].dog, dell:all[idx].dell, rtDog:all[idx].rtDog, rtDell:all[idx].rtDell, produtos:all[idx].produtos, dinheiro:all[idx].dinheiro, gorjeta:all[idx].gorjeta, nome:all[idx].nome};
          all[idx].nome = vals.nome || all[idx].nome;
          all[idx].origem = vals.origem;
          all[idx].dog = vals.dog; all[idx].dell = vals.dell;
          all[idx].rtDog = vals.rtDog; all[idx].rtDell = vals.rtDell;
          all[idx].produtos = vals.produtos; all[idx].dinheiro = vals.dinheiro; all[idx].gorjeta = vals.gorjeta;
          var saved = await setData('motoboys-entries', all);
          if(saved){
            var changed = [];
            ['dog','dell','rtDog','rtDell','produtos','dinheiro','gorjeta'].forEach(function(f){
              if(before[f]!==vals[f]) changed.push(f + ': ' + before[f] + ' → ' + vals[f]);
            });
            if(changed.length){
              logAudit(viewUnit, 'Editou lançamento de motoboy', vals.nome + ' · ' + turnoLabel(viewTurno) + ' · ' + viewDate + ' · ' + changed.join(', '));
            }
          }
        });
      });
    }
    if(!readOnly){ main.querySelectorAll('#mb-tbody tr').forEach(wireRow); }

    var addBtn = document.getElementById('mb-add-row');
    if(addBtn){
      addBtn.onclick = async function(){
        var nome = document.getElementById('mb-new-nome').value.trim();
        if(!nome){ showToast('Selecione um motoboy cadastrado.', 'error'); return; }
        var entry = {id:'e'+Date.now(), unit:viewUnit, date:viewDate, turno:viewTurno, nome:nome, origem:'geral', dog:0, dell:0, rtDog:0, rtDell:0, produtos:0, dinheiro:0, gorjeta:0};
        var all = await getData('motoboys-entries', []);
        all.push(entry);
        var saved = await setData('motoboys-entries', all);
        if(saved){ logAudit(viewUnit, 'Adicionou motoboy extra ao lançamento', nome + ' · ' + turnoLabel(viewTurno) + ' · ' + viewDate); }
        renderMotoboysDaily(main);
      };
    }
  }


  // ============ RELATÓRIO SEMANAL DE MOTOBOYS (dono/gerente) ============
  async function renderMotoboysReport(main){
    var canPickUnit = user.role==='dono';
    var viewUnit = canPickUnit ? (window.__mrUnit || 'unidade1') : user.unit;
    window.__mrUnit = viewUnit;
    var wk = weekDefaultRange();
    var startDate = window.__mrStart || wk.start;
    var endDate = window.__mrEnd || wk.end;

    var entries2 = await Promise.all([
      getData('motoboys-entries', []),
      getData('rates-' + viewUnit, DEFAULT_RATES),
      getData('motoboy-schedule', []),
      getData('motoboy-cadastro', [])
    ]);
    var entries = entries2[0];
    var rates = entries2[1];
    var schedule = entries2[2].filter(function(s){ return s.unit===viewUnit; });
    var cadastro = entries2[3];
    var cadastroAtivos = cadastro.filter(function(m){ return m.ativo!==false; });

    function pixFor(nome){
      var m = cadastro.find(function(x){ return x.nome.trim().toLowerCase()===nome.trim().toLowerCase(); });
      return m ? m.pix : '';
    }

    var periodEntries = entries.filter(function(e){ return e.unit===viewUnit && e.date>=startDate && e.date<=endDate; });

    var byName = {};
    periodEntries.forEach(function(e){
      var key = e.nome.trim().toLowerCase();
      if(!byName[key]) byName[key] = {nome:e.nome, total:0, almoco:0, tarde:0, noite:0};
      byName[key].total += calcTotal(e, rates);
      if(e.turno==='almoco') byName[key].almoco++;
      else if(e.turno==='tarde') byName[key].tarde++;
      else if(e.turno==='noite') byName[key].noite++;
    });
    schedule.forEach(function(s){
      var key = s.nome.trim().toLowerCase();
      if(!byName[key]) byName[key] = {nome:s.nome, total:0, almoco:0, tarde:0, noite:0};
    });

    var names = Object.keys(byName).sort(function(a,b){ return byName[a].nome.localeCompare(byName[b].nome); });

    var html = pageHead('Motoboys', 'Fechamento do período · diária somada automaticamente por turno trabalhado');

    if(canPickUnit){
      html += '<div class="unit-toggle" style="margin-bottom:14px; width:fit-content;">';
      UNITS.forEach(function(u){
        html += '<button data-unit="' + u.id + '" class="' + (viewUnit===u.id?'active':'') + '">' + u.label + '</button>';
      });
      html += '</div>';
    }

    html += '<div class="card">';
    html += '<div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:14px;">';
    html += '<div style="font-weight:600; font-size:14px;">' + labelUnit(viewUnit) + '</div>';
    html += '<div style="display:flex; gap:10px; flex-wrap:wrap;">';
    html += '<div class="form-field" style="margin:0;"><label for="mr-start">Data inicial</label><input type="date" id="mr-start" value="' + startDate + '"></div>';
    html += '<div class="form-field" style="margin:0;"><label for="mr-end">Data final</label><input type="date" id="mr-end" value="' + endDate + '"></div>';
    html += '</div></div>';

    html += '<div style="overflow-x:auto; margin-top:16px;"><table><thead><tr><th>Motoboy</th><th>Pix</th><th>Dias almoço</th><th>Dias tarde</th><th>Dias noite</th><th>Total a pagar</th></tr></thead><tbody>';
    var grandTotal = 0;
    names.forEach(function(key){
      var row = byName[key];
      grandTotal += row.total;
      html += '<tr><td>' + escapeHtml(row.nome) + '</td>' +
        '<td class="num-cell" style="color:var(--muted);">' + escapeHtml(pixFor(row.nome) || '—') + '</td>' +
        '<td class="num-cell">' + row.almoco + '</td><td class="num-cell">' + row.tarde + '</td><td class="num-cell">' + row.noite + '</td>' +
        '<td class="num-cell" style="font-weight:600;">' + money(row.total) + '</td></tr>';
    });
    if(names.length===0){
      html += '<tr><td colspan="6" class="empty">Nenhum motoboy na escala ou lançamento neste período.</td></tr>';
    } else {
      html += '<tr><td style="font-weight:700;">Total do período</td><td></td><td></td><td></td><td></td><td class="num-cell" style="font-weight:700;">' + money(grandTotal) + '</td></tr>';
    }
    html += '</tbody></table></div>';
    html += '</div>';

    html += '<div style="height:16px"></div>';
    html += '<div class="card">';
    html += '<div style="font-weight:600; font-size:14px;">Escala semanal — ' + labelUnit(viewUnit) + '</div>';
    html += '<div style="font-size:11.5px; color:var(--muted); margin-top:2px;">Escolha o turno e o dia, depois diga quem trabalha. Isso já preenche sozinho o lançamento do caixa. Diária: almoço ' + money(rates.diariaAlmoco) + ' · tarde ' + money(rates.diariaTarde) + ' · noite ' + money(rates.diariaNoite) + ' (ajuste em Configurações).</div>';

    var escTurno = window.__mrEscTurno || 'almoco';
    var escDia = window.__mrEscDia || 'seg';

    html += '<div style="margin-top:16px; font-size:11px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:.03em;">1. Turno</div>';
    html += '<div class="unit-toggle" style="margin-top:6px; width:fit-content;">';
    TURNOS.forEach(function(t){
      html += '<button data-esc-turno="' + t.id + '" class="' + (escTurno===t.id?'active':'') + '">' + t.label + '</button>';
    });
    html += '</div>';

    html += '<div style="margin-top:14px; font-size:11px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:.03em;">2. Dia da semana</div>';
    html += '<div class="unit-toggle" style="margin-top:6px; width:fit-content; flex-wrap:wrap;">';
    WEEKDAY_DISPLAY_ORDER.forEach(function(wid){
      html += '<button data-esc-dia="' + wid + '" class="' + (escDia===wid?'active':'') + '">' + weekdayLabel(wid) + '</button>';
    });
    html += '</div>';

    var escNames = schedule.filter(function(s){ return s.weekday===escDia && s.turno===escTurno; });
    html += '<div style="margin-top:18px; padding:16px; border:1px solid var(--line); border-radius:10px; background:var(--paper);">';
    html += '<div style="font-weight:600; font-size:13.5px; margin-bottom:12px;">Quem trabalha ' + turnoLabel(escTurno) + ' na ' + weekdayLabel(escDia) + '</div>';
    html += '<div class="sched-chips" style="margin-bottom:14px; min-height:28px;">';
    if(escNames.length===0){
      html += '<span style="font-size:12.5px; color:var(--muted);">Ninguém adicionado ainda para este turno/dia.</span>';
    } else {
      escNames.forEach(function(s){
        html += '<span class="chip" style="font-size:12.5px; padding:5px 10px;">' + escapeHtml(s.nome) + '<button data-remove-sched="' + s.id + '" aria-label="Remover">×</button></span>';
      });
    }
    html += '</div>';
    html += '<div style="display:flex; gap:8px; flex-wrap:wrap;">';
    if(cadastroAtivos.length===0){
      html += '<span style="font-size:12.5px; color:var(--muted);">Cadastre um motoboy em Configurações primeiro para poder escalá-lo.</span>';
    } else {
      html += '<select class="grid-select" style="width:220px;" id="esc-new-nome"><option value="">Selecionar motoboy…</option>';
      cadastroAtivos.forEach(function(m){ html += '<option value="' + escapeHtml(m.nome) + '">' + escapeHtml(m.nome) + '</option>'; });
      html += '</select>';
      html += '<button class="btn primary" id="esc-add-btn">Adicionar à escala</button>';
    }
    html += '</div>';
    html += '</div>';

    html += '<div style="margin-top:20px; font-size:11px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:.03em;">Resumo da semana</div>';
    html += '<div style="margin-top:8px;">';
    WEEKDAY_DISPLAY_ORDER.forEach(function(wid){
      var parts = TURNOS.map(function(t){
        var ns = schedule.filter(function(s){ return s.weekday===wid && s.turno===t.id; }).map(function(s){ return s.nome; });
        return t.label + ': ' + (ns.length ? ns.join(', ') : '—');
      });
      html += '<div style="font-size:12.5px; padding:7px 0; border-bottom:1px solid var(--line);"><b>' + weekdayLabel(wid) + '</b> — ' + parts.join(' · ') + '</div>';
    });
    html += '</div>';
    html += '</div>';

    main.innerHTML = html;

    if(canPickUnit){
      main.querySelectorAll('.unit-toggle button').forEach(function(b){
        b.onclick = function(){ window.__mrUnit = b.getAttribute('data-unit'); renderMotoboysReport(main); };
      });
    }
    document.getElementById('mr-start').onchange = function(ev){ window.__mrStart = ev.target.value || startDate; renderMotoboysReport(main); };
    document.getElementById('mr-end').onchange = function(ev){ window.__mrEnd = ev.target.value || endDate; renderMotoboysReport(main); };

    main.querySelectorAll('[data-esc-turno]').forEach(function(b){
      b.onclick = function(){ window.__mrEscTurno = b.getAttribute('data-esc-turno'); renderMotoboysReport(main); };
    });
    main.querySelectorAll('[data-esc-dia]').forEach(function(b){
      b.onclick = function(){ window.__mrEscDia = b.getAttribute('data-esc-dia'); renderMotoboysReport(main); };
    });

    main.querySelectorAll('[data-remove-sched]').forEach(function(btn){
      btn.onclick = async function(){
        var id = btn.getAttribute('data-remove-sched');
        var all = await getData('motoboy-schedule', []);
        var target = all.find(function(s){ return s.id===id; });
        all = all.filter(function(s){ return s.id!==id; });
        var saved = await setData('motoboy-schedule', all);
        if(saved && target){ logAudit(viewUnit, 'Removeu da escala', target.nome + ' · ' + weekdayLabel(target.weekday) + ' · ' + turnoLabel(target.turno)); }
        renderMotoboysReport(main);
      };
    });

    async function addToSchedule(weekday, turno, nome){
      nome = (nome||'').trim();
      if(!nome){ showToast('Selecione o motoboy antes de adicionar.', 'error'); return; }
      var all = await getData('motoboy-schedule', []);
      var dup = all.some(function(s){
        return s.unit===viewUnit && s.weekday===weekday && s.turno===turno && s.nome.trim().toLowerCase()===nome.toLowerCase();
      });
      if(dup){ renderMotoboysReport(main); return; }
      all.push({id:'s'+Date.now()+Math.random().toString(16).slice(2), unit:viewUnit, weekday:weekday, turno:turno, nome:nome});
      var saved = await setData('motoboy-schedule', all);
      if(!saved) return;
      logAudit(viewUnit, 'Adicionou à escala', nome + ' · ' + weekdayLabel(weekday) + ' · ' + turnoLabel(turno));
      renderMotoboysReport(main);
    }

    var escInput = document.getElementById('esc-new-nome');
    if(escInput){
      escInput.addEventListener('keydown', function(ev){
        if(ev.key!=='Enter') return;
        ev.preventDefault();
        addToSchedule(escDia, escTurno, escInput.value);
      });
    }
    var escBtn = document.getElementById('esc-add-btn');
    if(escBtn){
      escBtn.onclick = function(){ addToSchedule(escDia, escTurno, document.getElementById('esc-new-nome').value); };
    }
  }

  // ============ FECHAMENTO DE CAIXA ============
  var CAIXA_TURNOS = [
    {id:'dia', label:'Dia', motoboyTurnos:['almoco','tarde']},
    {id:'noite', label:'Noite', motoboyTurnos:['noite']}
  ];
  function caixaLabel(id){ var t = CAIXA_TURNOS.find(function(x){ return x.id===id; }); return t ? t.label : id; }
  function caixaKey(unit,date,turno){ return unit + '_' + date + '_' + turno; }

  async function renderFechamento(main){
    var isManagerRole = (user.role==='dono' || user.role==='gerente');
    var isCaixaRole = user.role==='caixa';
    var canPickUnit = user.role==='dono';
    var viewUnit = canPickUnit ? (window.__cxUnit || 'unidade1') : user.unit;
    window.__cxUnit = viewUnit;
    var viewDate = window.__cxDate || todayISO();
    var viewTurno = window.__cxTurno || 'dia';
    var turnoDef = CAIXA_TURNOS.find(function(t){ return t.id===viewTurno; });

    var key = caixaKey(viewUnit, viewDate, viewTurno);
    var cxLoaded = await Promise.all([
      getData('caixa-fechamento', {}),
      getData('caixa-fechamento-status', {}),
      getData('motoboys-entries', [])
    ]);
    var store = cxLoaded[0];
    var rec = store[key] || {abertura:0, vendas:0, retiradas:0, reforcos:0, transferencias:0, emCaixa:0};

    var statusAll = cxLoaded[1];
    var cxStatus = statusAll[key] || null;
    var locked = !!(cxStatus && cxStatus.closed);
    var canEdit = locked ? isManagerRole : isCaixaRole;

    var motoboyEntries = cxLoaded[2];
    var motoboyRetirada = motoboyEntries
      .filter(function(e){ return e.unit===viewUnit && e.date===viewDate && turnoDef.motoboyTurnos.indexOf(e.turno)!==-1; })
      .reduce(function(sum,e){ return sum + (e.dinheiro||0); }, 0);

    function esperado(r){ return (r.abertura||0) + (r.vendas||0) - (r.retiradas||0) - motoboyRetirada + (r.reforcos||0) + (r.transferencias||0); }
    function saldo(r){ return (r.emCaixa||0) - esperado(r); }

    var html = pageHead('Fechamento de caixa', 'Dinheiro · turno ' + caixaLabel(viewTurno) + (canEdit ? ' · preencha ao fechar o turno' : ' · somente leitura'));

    if(canPickUnit){
      html += '<div class="unit-toggle" style="margin-bottom:14px; width:fit-content;">';
      UNITS.forEach(function(u){
        html += '<button data-unit="' + u.id + '" class="' + (viewUnit===u.id?'active':'') + '">' + u.label + '</button>';
      });
      html += '</div>';
    }

    html += '<div class="unit-toggle" style="margin-bottom:14px; width:fit-content;">';
    CAIXA_TURNOS.forEach(function(t){
      html += '<button data-cx-turno="' + t.id + '" class="' + (viewTurno===t.id?'active':'') + '">' + t.label + '</button>';
    });
    html += '</div>';

    if(locked){
      html += '<div class="card" style="margin-bottom:14px; background:var(--warn-bg); border-color:var(--warn-txt);">';
      html += '<div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px;">';
      html += '<div style="font-size:13px; color:var(--warn-txt); font-weight:600;"><i class="ti ti-lock" aria-hidden="true"></i> Fechamento finalizado por ' + escapeHtml(cxStatus.closedBy) + ' em ' + fmtDateTime(cxStatus.closedAt) + (isManagerRole ? ' · você pode editar por ser Dono/Gerente' : ' · somente Dono/Gerente podem editar agora') + '</div>';
      if(isManagerRole){ html += '<button class="btn" id="cx-reopen">Reabrir para edição</button>'; }
      html += '</div></div>';
    }

    html += '<div class="card">';
    html += '<div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:12px; margin-bottom:6px;">';
    html += '<div style="font-weight:600; font-size:14px;">' + labelUnit(viewUnit) + ' · ' + caixaLabel(viewTurno) + '</div>';
    html += '<div class="form-field" style="margin:0;"><label for="cx-date">Data</label><input type="date" id="cx-date" value="' + viewDate + '"></div>';
    html += '</div>';

    function row(field, label, sub, editableField){
      var val = rec[field] || 0;
      var right = (canEdit && editableField)
        ? '<input class="kv-input" type="number" min="0" step="0.01" id="cx-' + field + '" value="' + val + '">'
        : '<span class="kv-value" id="cx-view-' + field + '">' + money(val) + '</span>';
      return '<div class="kv-row"><div><div class="kv-label">' + label + '</div><div class="kv-sub">' + sub + '</div></div>' + right + '</div>';
    }

    html += row('abertura','Abertura de caixa','Entrada inicial do turno (+)', true);
    html += row('vendas','Vendas','Total vendido em dinheiro (+)', true);
    html += row('retiradas','Retiradas','Outras saídas do caixa, fora motoboys (-)', true);
    html += '<div class="kv-row"><div><div class="kv-label">Retirada motoboys</div><div class="kv-sub">Somado automaticamente do dinheiro retirado pelos motoboys neste turno (-)</div></div><span class="kv-value">' + money(motoboyRetirada) + '</span></div>';
    html += row('reforcos','Reforços','Reforço de troco (+)', true);
    html += row('transferencias','Transferências','Entre caixas (+)', true);

    html += '<div class="kv-row"><div><div class="kv-label">Esperado</div><div class="kv-sub">Calculado automaticamente</div></div><span class="kv-value" id="cx-esperado">' + money(esperado(rec)) + '</span></div>';
    html += row('emCaixa','Em caixa','Valor contado fisicamente', true);
    html += '<div class="kv-row"><div><div class="kv-label">Saldo</div><div class="kv-sub">Em caixa − esperado</div></div><span class="saldo-pill ' + (saldo(rec)>=0?'pos':'neg') + '" id="cx-saldo">' + money(saldo(rec)) + '</span></div>';

    if(canEdit){
      html += '<div style="margin-top:16px; display:flex; gap:10px; flex-wrap:wrap;"><button class="btn primary" id="cx-save">Salvar fechamento</button>';
      if(!locked){ html += '<button class="btn" id="cx-finalize" style="border-color:var(--ember); color:var(--ember);"><i class="ti ti-lock" aria-hidden="true"></i> Finalizar fechamento</button>'; }
      html += '</div>';
    }
    html += '</div>';

    main.innerHTML = html;

    if(canPickUnit){
      main.querySelectorAll('.unit-toggle button[data-unit]').forEach(function(b){
        b.onclick = function(){ window.__cxUnit = b.getAttribute('data-unit'); renderFechamento(main); };
      });
    }
    main.querySelectorAll('.unit-toggle button[data-cx-turno]').forEach(function(b){
      b.onclick = function(){ window.__cxTurno = b.getAttribute('data-cx-turno'); renderFechamento(main); };
    });
    document.getElementById('cx-date').onchange = function(ev){
      window.__cxDate = ev.target.value || todayISO();
      renderFechamento(main);
    };

    var reopenBtn = document.getElementById('cx-reopen');
    if(reopenBtn){
      reopenBtn.onclick = async function(){

  function driveFolderStack(){
    if(!window.__driveStack){ window.__driveStack = [{id: DEFAULT_DRIVE_FOLDER_ID, name:'Documentos'}]; }
    return window.__driveStack;
  }

  function connectDrive(main){
    if(GOOGLE_CLIENT_ID.indexOf('COLE_AQUI')===0){
      showToast('Configuração pendente: cole o Client ID do Google no index.html.', 'error');
      return;
    }
    var client = google.accounts.oauth2.initTokenClient({
      client_id: GOOGLE_CLIENT_ID,
      scope: 'https://www.googleapis.com/auth/drive.readonly',
      callback: function(resp){
        if(resp.error){ showToast('Não foi possível conectar ao Drive (' + resp.error + ').', 'error'); return; }
        driveAccessToken = resp.access_token;
        renderDocumentos(main);
      }
    });
    client.requestAccessToken();
  }

  async function fetchDriveFiles(folderId){
    var q = "'" + folderId + "' in parents and trashed = false";
    var url = 'https://www.googleapis.com/drive/v3/files?q=' + encodeURIComponent(q) +
      '&fields=' + encodeURIComponent('files(id,name,mimeType,webViewLink,iconLink,modifiedTime)') +
      '&orderBy=folder,name&pageSize=200';
    var res = await fetch(url, {headers:{Authorization:'Bearer ' + driveAccessToken}});
    if(res.status===401 || res.status===403){
      driveAccessToken = null;
      throw new Error('sessão do Drive expirou');
    }
    if(!res.ok){ throw new Error('erro ao consultar o Drive (' + res.status + ')'); }
    var data = await res.json();
    return data.files || [];
  }

    var html = pageHead('Documentos', 'Pasta do Google Drive, sem precisar copiar link');

    });
    document.getElementById('drive-refresh').onclick = function(){ renderDocumentos(main); };

    try{
      var files = await fetchDriveFiles(current.id);
      var listEl = document.getElementById('drive-file-list');
      if(!listEl) return; // usuário já navegou pra outro lugar
      if(files.length===0){
        listEl.innerHTML = '<div class="empty">Pasta vazia.</div>';
        return;
      }
      var lhtml = '<table><thead><tr><th></th><th>Nome</th><th>Modificado</th><th></th></tr></thead><tbody>';
      files.forEach(function(f){
        var isFolder = f.mimeType==='application/vnd.google-apps.folder';
        var modDate = f.modifiedTime ? new Date(f.modifiedTime).toLocaleDateString('pt-BR') : '—';
        lhtml += '<tr>' +
          '<td><img src="' + f.iconLink + '" alt="" style="width:18px; height:18px; vertical-align:middle;"></td>' +
          '<td>' + (isFolder
            ? '<button class="btn" data-open-folder="' + f.id + '" data-name="' + escapeHtml(f.name) + '" style="padding:4px 9px; font-weight:600;">' + escapeHtml(f.name) + '</button>'
            : escapeHtml(f.name)) + '</td>' +
          '<td class="num-cell">' + modDate + '</td>' +
          '<td>' + (isFolder ? '' : '<a class="btn" href="' + f.webViewLink + '" target="_blank" rel="noopener">Abrir <i class="ti ti-external-link" aria-hidden="true"></i></a>') + '</td>' +
        '</tr>';
      });
      lhtml += '</tbody></table>';
      listEl.innerHTML = lhtml;

      listEl.querySelectorAll('[data-open-folder]').forEach(function(b){
        b.onclick = function(){
          window.__driveStack.push({id: b.getAttribute('data-open-folder'), name: b.getAttribute('data-name')});
          renderDocumentos(main);
        };
      });
    }catch(err){
      var listEl2 = document.getElementById('drive-file-list');
      if(!listEl2) return;
      listEl2.innerHTML = '<div class="empty">Não foi possível carregar os arquivos (' + escapeHtml(err.message) + '). <button class="btn" id="drive-reconnect">Reconectar</button></div>';

      if(reconnectBtn) reconnectBtn.onclick = function(){ connectDrive(main); };
    }
  }

  function openDataUrlInNewTab(dataUrl){
    try{
      var parts = dataUrl.split(',');
      var mimeMatch = parts[0].match(/data:(.*?);base64/);
      var mime = mimeMatch ? mimeMatch[1] : 'application/pdf';
      var binary = atob(parts[1]);
      var bytes = new Uint8Array(binary.length);
      for(var i=0; i<binary.length; i++){ bytes[i] = binary.charCodeAt(i); }
      var blob = new Blob([bytes], {type: mime});
      var blobUrl = URL.createObjectURL(blob);
      window.open(blobUrl, '_blank');
    }catch(err){
      showToast('Não consegui abrir esse arquivo.', 'error');
    }
  }

  function resizeImageFile(file, maxDim){
    return new Promise(function(resolve, reject){
      var reader = new FileReader();
      reader.onload = function(e){
        var img = new Image();
        img.onload = function(){
          var w = img.width, h = img.height;
          if(w > h){ if(w > maxDim){ h = Math.round(h*maxDim/w); w = maxDim; } }
          else { if(h > maxDim){ w = Math.round(w*maxDim/h); h = maxDim; } }
          var canvas = document.createElement('canvas');
          canvas.width = w; canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);
          resolve(canvas.toDataURL('image/jpeg', 0.75));
        };
        img.onerror = function(){ reject(new Error('não consegui ler essa imagem')); };
        img.src = e.target.result;
      };
      reader.onerror = function(){ reject(new Error('não consegui ler esse arquivo')); };
      reader.readAsDataURL(file);
    });
  }

    main.querySelectorAll('[data-ct-tipo]').forEach(function(b){
      b.onclick = function(){ window.__ctTipo = b.getAttribute('data-ct-tipo'); renderConteudo(main); };
    });
    main.querySelectorAll('[data-open-pdf]').forEach(function(b){
      b.onclick = function(){
        var it = items.find(function(x){ return x.id===b.getAttribute('data-open-pdf'); });
        if(it && it.anexoPdf) openDataUrlInNewTab(it.anexoPdf);
      };
    });

    items.forEach(function(it){
      if(it.tipo!=='receita') return;
      var baseEl = document.getElementById('r3-base-' + it.id);
      var ingEl = document.getElementById('r3-ing-' + it.id);
      var desejadoEl = document.getElementById('r3-desejado-' + it.id);
      var resultEl = document.getElementById('r3-resultado-' + it.id);
      if(!baseEl || !ingEl || !desejadoEl || !resultEl) return;
      function calcular(){
        var base = parseFloat(baseEl.value);
        var ing = parseFloat(ingEl.value);
        var desejado = parseFloat(desejadoEl.value);
        if(!base || !ing || !desejado){ resultEl.textContent = 'Resultado: preencha os 3 campos acima'; return; }
        var resultado = (ing * desejado) / base;
        resultEl.textContent = 'Resultado: use ' + (Math.round(resultado*100)/100) + ' (na mesma unidade do ingrediente que você informou)';
      }
      [baseEl, ingEl, desejadoEl].forEach(function(el){ el.addEventListener('input', calcular); });
    });

    main.querySelectorAll('[data-prod-toggle]').forEach(function(b){
      b.onclick = function(){
        var id = b.getAttribute('data-prod-toggle');
        window.__ctProdOpenId = (window.__ctProdOpenId===id) ? null : id;
        renderConteudo(main);
      };
    });
    main.querySelectorAll('[data-prod-save]').forEach(function(b){
      b.onclick = async function(){
        var id = b.getAttribute('data-prod-save');
        var data = document.getElementById('prod-data-' + id).value || todayISO();
        var rendimento = document.getElementById('prod-rendimento-' + id).value.trim();
        if(!rendimento){ showToast('Informe o rendimento obtido.', 'error'); return; }
        var all = await getConteudo();
        var idx = all.findIndex(function(x){ return x.id===id; });
        if(idx===-1) return;
        all[idx].producoes = all[idx].producoes || [];
        all[idx].producoes.push({id:'p'+Date.now(), data:data, rendimento:rendimento, responsavel:user.nome || labelRole(user.role)});
        var saved = await setData('conteudo', all);
        if(saved){ logAudit(all[idx].marca==='todas' ? 'Ambas as unidades' : all[idx].marca, 'Registrou rendimento', all[idx].titulo + ' · ' + rendimento); }
        window.__ctProdOpenId = null;
        renderConteudo(main);
      };
    });

    if(canEdit){
      var showFormBtn = document.getElementById('ct-show-form');
      if(showFormBtn){ showFormBtn.onclick = function(){ window.__ctShowForm = true; renderConteudo(main); }; }

      var cancelBtn = document.getElementById('item-cancel');
      if(cancelBtn){
        cancelBtn.onclick = function(){ window.__ctEditingId = null; window.__ctShowForm = false; renderConteudo(main); };
      }

      if(showForm){
        var pendingImage = editing ? (editing.imagem || '') : '';
        var pendingPdf = editing ? (editing.anexoPdf || '') : '';
        var imageInput = document.getElementById('item-image');
        imageInput.addEventListener('change', async function(){
          var file = imageInput.files[0];
          if(!file) return;
          try{
            if(file.type==='application/pdf'){
              if(file.size > 4*1024*1024){ showToast('PDF muito grande (máximo 4MB).', 'error'); return; }
              pendingPdf = await new Promise(function(resolve, reject){
                var reader = new FileReader();
                reader.onload = function(e){ resolve(e.target.result); };
                reader.onerror = function(){ reject(new Error('erro')); };
                reader.readAsDataURL(file);
              });
              pendingImage = '';
              document.getElementById('item-image-preview').innerHTML = '<span style="font-size:12.5px; color:var(--muted);">PDF selecionado: ' + escapeHtml(file.name) + '</span>';
            } else {
              pendingImage = await resizeImageFile(file, 900);
              pendingPdf = '';
              document.getElementById('item-image-preview').innerHTML = '<img src="' + pendingImage + '" style="max-width:160px; border-radius:8px;">';
            }
          }catch(err){
            showToast('Não consegui processar esse arquivo.', 'error');
          }
        });

        document.getElementById('item-save').onclick = async function(){
          var t = document.getElementById('item-title').value.trim();
          var b = document.getElementById('item-body').value.trim();
          var tipo = document.getElementById('item-tipo').value;
          var marca = document.getElementById('item-marca').value;
          var rendimento = document.getElementById('item-rendimento').value.trim();
          if(!t){ showToast('Dê um título ao item.', 'error'); return; }
          var all = await getConteudo();
          if(editing){
            var idx = all.findIndex(function(x){ return x.id===editing.id; });
            if(idx>-1){ all[idx] = {id:editing.id, tipo:tipo, titulo:t, corpo:b, rendimento:rendimento, marca:marca, imagem:pendingImage, anexoPdf:pendingPdf, producoes:editing.producoes||[]}; }
            var saved1 = await setData('conteudo', all);
            if(saved1){ logAudit(marca==='todas' ? 'Ambas as unidades' : marca, 'Editou ' + (tipo==='receita'?'receita':'processo'), t); }
          } else {
            all.push({id:'i'+Date.now(), tipo:tipo, titulo:t, corpo:b, rendimento:rendimento, marca:marca, imagem:pendingImage, anexoPdf:pendingPdf, producoes:[]});
            var saved2 = await setData('conteudo', all);
            if(saved2){ logAudit(marca==='todas' ? 'Ambas as unidades' : marca, 'Adicionou ' + (tipo==='receita'?'receita':'processo'), t); }
          }
          window.__ctEditingId = null;
          window.__ctShowForm = false;
          renderConteudo(main);
        };
      }

      main.querySelectorAll('[data-edit-item]').forEach(function(btn){
        btn.onclick = function(){ window.__ctEditingId = btn.getAttribute('data-edit-item'); window.__ctShowForm = true; renderConteudo(main); };
      });

      main.querySelectorAll('[data-remove-item]').forEach(function(btn){
        btn.onclick = async function(){
          if(!(await showConfirm('Remover este item?', 'Remover'))) return;
          var id = btn.getAttribute('data-remove-item');
          var all = await getConteudo();
          var target = all.find(function(x){ return x.id===id; });
          all = all.filter(function(x){ return x.id!==id; });
          var saved = await setData('conteudo', all);
          if(saved && target){ logAudit(target.marca==='todas' ? 'Ambas as unidades' : target.marca, 'Removeu item', target.titulo); }
          renderConteudo(main);
        };
      });
    }
  }

  async function renderChecklists(main){

    var html = pageHead('Checklists', 'Operação e limpeza de equipamentos seguem no Alô Chefia');

    html += '<div class="card">';
    html += '<div style="font-weight:600; font-size:14px;">Abrir checklists no Alô Chefia</div>';
    html += '<div style="font-size:12.5px; color:var(--muted); margin-top:4px;">O detalhe de cada checklist continua na Alô Chefia. Aqui você só acompanha se o checklist do dia foi concluído.</div>';
    html += '<div style="margin-top:14px;"><a class="btn primary" href="https://app.alochefia.com.br/login" target="_blank" rel="noopener">Abrir Alô Chefia <i class="ti ti-external-link" aria-hidden="true"></i></a></div>';
    html += '</div>';

    html += '<div style="height:16px"></div>';

    unitsToShow.forEach(function(uid){
      var st = status[uid] || {};
      var done = st.date===todayISO() && st.done;
      html += '<div class="card" style="margin-bottom:12px;">';
      html += '<div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px;">';
